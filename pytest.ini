[pytest]
# Pytest Configuration for SLSD Vision Platform

# 测试目录
testpaths = tests

# Python文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 最小Python版本
minversion = 3.8

# 控制台输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# 标记定义
markers =
    integration: 集成测试（需要完整应用上下文）
    workflow: 工作流测试（多步骤业务流程）
    slow: 运行较慢的测试
    auth: 认证相关测试
    dataset: 数据集相关测试
    model: 模型相关测试
    stats: 统计相关测试
    settings: 设置相关测试
    concurrent: 并发测试

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（如果使用pytest-cov）
[coverage:run]
source = .
omit =
    */tests/*
    */node_modules/*
    */venv/*
    */__pycache__/*
    */dist/*
    */build/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
