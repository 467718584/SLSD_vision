function Tag({label,colors}){
  const c=colors||{bg:C.gray6,border:C.border,text:C.gray2};
  return React.createElement('span',{style:{display:"inline-block",padding:"2px 8px",borderRadius:"4px",fontSize:"11px",fontWeight:500,background:c.bg,border:`1px solid ${c.border}`,color:c.text,whiteSpace:"nowrap"}},label);
}
function AlgoTag({type}){return React.createElement(Tag,{label:type,colors:ALGO_COLORS[type]||ALGO_COLORS["其他"]});}
function TechMethodTag({type}){return React.createElement(Tag,{label:type,colors:TECH_METHOD_COLORS[type]||TECH_METHOD_COLORS["目标检测算法"]});}
function ModelCatTag({cat}){return React.createElement(Tag,{label:cat,colors:MODEL_CAT_COLORS[cat]});}

function MiniHeatmap({seed,size=52}){
  const cells=6,s=size;
  const rects=[];
  for(let r=0;r<cells;r++)for(let c=0;c<cells;c++){
    const v=Math.abs(Math.sin(seed*17+r*5+c*7));
    const intensity=Math.round(v*200);
    const fill=r===c?C.primary:`rgb(${255-Math.round(intensity*0.3)},${255-Math.round(intensity*0.6)},255)`;
    rects.push(React.createElement('rect',{key:`${r}-${c}`,x:c*(s/cells),y:r*(s/cells),width:s/cells-0.5,height:s/cells-0.5,fill,opacity:r===c?0.85:0.4+v*0.5}));
  }
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},rects);
}
// 真实类别标注分布热力图组件
function ClassHeatmap({classInfo,size=64}){
  const entries=Object.entries(classInfo||{});
  const classCount=Math.min(entries.length,6);
  const cells=Math.max(classCount,2);
  const s=size;
  // 计算最大数量用于归一化
  const maxCount=entries.reduce((max,[,v])=>{const c=typeof v==="number"?v:(v&&v.count?v.count:0);return Math.max(max,c);},1)||1;
  // 生成热力图矩阵 (类别数 x 固定显示格数)
  const rects=[];
  for(let r=0;r<cells;r++){
    for(let c=0;c<cells;c++){
      let count=0;
      if(r<entries.length){
        const v=entries[r][1];
        count=typeof v==="number"?v:(v&&v.count?v.count:0);
      }
      const intensity=count/maxCount;
      // 使用蓝色渐变色
      const blue=Math.round(180+intensity*75);
      const fill=`rgb(200,220,${blue})`;
      rects.push(React.createElement('rect',{key:`${r}-${c}`,x:c*(s/cells),y:r*(s/cells),width:s/cells-0.5,height:s/cells-0.5,fill,opacity:0.5+intensity*0.5}));
    }
  }
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},rects);
}
function MiniDistChart({seed,size=52}){
  const bars=8;
  const heights=Array.from({length:bars},(_,i)=>Math.max(0.12,Math.exp(-Math.pow((i-bars/2)/2,2))*0.85+Math.abs(Math.sin(seed*13.7+i*2.3))*0.15));
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F0F7FF",rx:"2"}),
    ...heights.map((h,i)=>{const bw=size/bars-1,bh=h*(size-6);return React.createElement('rect',{key:i,x:i*(size/bars)+0.5,y:size-bh-3,width:bw,height:bh,fill:C.primary,opacity:0.55+i*0.05,rx:"1"});})
  );
}

function DetailChart({datasetName,size=50,onClick}){
  const [chartUrl,setChartUrl]=React.useState(null);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(function(){
    setLoading(true);
    fetch("/api/dataset/"+encodeURIComponent(datasetName)+"/charts")
      .then(function(res){return res.json();})
      .then(function(data){
        if(data.detail){
          setChartUrl("/data/"+data.detail.replace("SLSD_vision/data/",""));
        }
        setLoading(false);
      })
      .catch(function(){
        setLoading(false);
      });
  },[datasetName]);

  if(loading){
    return React.createElement('div',{style:{width:size,height:size,background:C.gray6,borderRadius:"3px"}});
  }
  if(!chartUrl){
    return React.createElement('div',{onClick:onClick,style:{cursor:onClick?"pointer":"default"}},
      React.createElement(MiniHeatmap,{seed:Math.abs(datasetName.split("").reduce(function(a,c){return a+c.charCodeAt(0)},0)),size:size})
    );
  }
  return React.createElement('img',{src:chartUrl,alt:"detail",onClick:onClick,style:{width:size,height:size,objectFit:"cover",borderRadius:"3px",cursor:onClick?"pointer":"default"}});
}

function MiniCurve({seed,size=48,color=C.primary}){
  const pts=Array.from({length:10},(_,i)=>Math.min(0.98,Math.max(0.1,1-Math.exp(-i*0.4)+Math.sin(seed*11+i*3.7)*0.03)));
  const w=size,h=size-4;
  const coords=pts.map((v,i)=>`${(i/(pts.length-1))*(w-4)+2},${h-v*(h-4)+2}`).join(" ");
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F4F8FC",rx:"2"}),
    React.createElement('polyline',{points:coords,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"})
  );
}
function MiniPreviewGrid({seed,count=8,algoType}){
  const col=(ALGO_COLORS[algoType]||{text:C.primary}).text;
  const total=Math.min(count,8);
  return React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:"2px"}},
    Array.from({length:total},(_,i)=>{
      const hasBox=Math.sin(seed*5+i)>0.1;
      return React.createElement('div',{key:i,style:{width:"26px",height:"19px",background:`hsl(${205+(seed+i*7)%40},${28+i%12}%,${84-i}%)`,borderRadius:"2px",position:"relative",overflow:"hidden",border:`1px solid ${C.border}`,flexShrink:0}},
        hasBox&&React.createElement('div',{style:{position:"absolute",left:"15%",top:"10%",width:"55%",height:"65%",border:`1.5px solid ${col}`,borderRadius:"1px",opacity:0.85}})
      );
    })
  );
}

// 表格中的真实缩略图组件
function TablePreviewGrid({datasetName,count=4,onPreview}){
  const [images,setImages]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(false);

  React.useEffect(function(){
    setLoading(true);
    setError(false);
    // 使用split-images API获取可视化图片
    fetch("/api/dataset/"+encodeURIComponent(datasetName)+"/split-images")
      .then(function(res){return res.json();})
      .then(function(data){
        // 合并所有split的图片
        var allImages=[];
        if(data.train) allImages=allImages.concat(data.train);
        if(data.val) allImages=allImages.concat(data.val);
        if(data.test) allImages=allImages.concat(data.test);
        if(allImages.length>0){
          setImages(allImages.slice(0,count));
        }else{
          setError(true);
        }
        setLoading(false);
      })
      .catch(function(){
        setError(true);
        setLoading(false);
      });
  },[datasetName,count]);

  if(loading){
    return React.createElement('div',{style:{display:"flex",gap:"2px",flexWrap:"wrap"}},
      Array.from({length:count},(_,i)=>
        React.createElement('div',{key:i,style:{width:"28px",height:"28px",background:C.gray6,borderRadius:"2px",border:`1px solid ${C.border}`}})
      )
    );
  }

  if(error||images.length===0){
    return React.createElement(MiniPreviewGrid,{seed:datasetName.length,count:count,algoType:null});
  }

  return React.createElement('div',{style:{display:"flex",gap:"2px",flexWrap:"wrap"}},
    images.map(function(img,i){
      const imgUrl="/data/"+img.replace("SLSD_vision/data/","");
      return React.createElement('img',{key:i,src:imgUrl,alt:"preview",style:{width:"28px",height:"28px",objectFit:"cover",borderRadius:"2px",border:`1px solid ${C.border}`,cursor:"pointer"},
        onClick:function(e){e.stopPropagation();if(onPreview)onPreview(img);},
        title:"点击查看大图"
      });
    })
  );
}

  const [splitImages,setSplitImages]=React.useState({train:[],val:[],test:[]});
  const [loading,setLoading]=React.useState(true);

  const [chartType,setChartType]=React.useState("");
  const [editModal,setEditModal]=React.useState(false);
  const [editData,setEditData]=React.useState({algoType:ds.algoType||"其他",techMethod:ds.techMethod||"目标检测算法"});
  const [uploading,setUploading]=React.useState(false);
  const [detailChartFile,setDetailChartFile]=React.useState(null);
  const [distChartFile,setDistChartFile]=React.useState(null);

  function handleSaveEdit(){
    setUploading(true);
    Promise.all([
      detailChartFile?uploadChart(detailChartFile,"detail"):Promise.resolve(),
      distChartFile?uploadChart(distChartFile,"distribution"):Promise.resolve()
    ]).then(function(){
      fetch("/api/dataset/"+encodeURIComponent(ds.name),{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({algoType:editData.algoType,techMethod:editData.techMethod})
      }).then(function(r){return r.json();}).then(function(data){
        setEditModal(false);
        setDetailChartFile(null);
        setDistChartFile(null);
        setUploading(false);
        if(onRefresh)onRefresh();
        window.location.reload();
      }).catch(function(err){
        setUploading(false);
        alert("保存失败: "+err.message);
      });
    }).catch(function(err){
      setUploading(false);
      alert("上传图表失败: "+err.message);
    });
  }

  function uploadChart(file,type){
    return new Promise(function(resolve,reject){
      const formData=new FormData();
      formData.append("file",file);
      formData.append("type",type);
      formData.append("dataset",ds.name);
      fetch("/api/dataset/"+encodeURIComponent(ds.name)+"/chart-upload",{
        method:"POST",
        body:formData
      }).then(function(r){return r.json();}).then(function(data){
        resolve(data);
      }).catch(reject);
    });
  }

  React.useEffect(function(){
    setLoading(true);
    fetch("/api/dataset/"+encodeURIComponent(ds.name)+"/split-images")

        if(data.success){
          setModelDetail(data);

        setLoading(false);

      .catch(function(){
        setLoading(false);

  },[model.name]);

  const ds=(datasets||[]).find(d=>d.name===model.dataset);
  const col=model.accuracy>=95?C.success:model.accuracy>=85?C.primary:C.warning;

  const handleSubmit=async function(){

    if(!dataset){setError("请选择关联数据集");return;}

    setError("");
    setUploading(true);
    setProgress(10);

    const formData=new FormData();
    for(let i=0;i<folder.length;i++){

    formData.append("name",name);
    formData.append("algoName",algoName);
    formData.append("techMethod",techMethod);
    formData.append("category",category);
    formData.append("accuracy",(accuracy||0).toString());
    formData.append("description",description);
    formData.append("maintainer",maintainer);
    formData.append("dataset",dataset);

    try{
      setProgress(30);
      const response=await fetch("/api/model/upload",{
        method:"POST",
        body:formData
      });
      setProgress(70);
      const contentType=response.headers.get("content-type");
      if(!contentType || !contentType.includes("application/json")){
        const text=await response.text();
        setError("服务器错误: "+text.substring(0,100));
        setUploading(false);
        return;
      }
      const data=await response.json();
      if(data.success){
        setProgress(100);
        if(onClose)onClose();
        setName("");setFolder(null);setDescription("");
        alert("上传成功！");
        if(onSuccess)onSuccess();
      }else{
        setError(data.error||"上传失败");
        setUploading(false);
      }

      setError("上传失败: "+e.message);
      setUploading(false);
    }
  };

      ),
      React.createElement('div',{style:{padding:"20px 24px"}},
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('div',{style:{fontSize:"13px",color:C.gray2,marginBottom:"6px"}},"模型名称 *"),
          React.createElement('input',{value:name,onChange:function(e){setName(e.target.value);},placeholder:"请输入模型名称",
            style:{width:"100%",padding:"8px",borderRadius:"4px",border:`1px solid ${C.border}`,fontSize:"13px"}})
        ),
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}},
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:"13px",color:C.gray2,marginBottom:"6px"}},"算法类型"),

// ===== Edit Class Info Modal =====
function EditClassInfoModal(props){
  const ds=props.ds;
  const onClose=props.onClose;
  const onSave=props.onSave;
  const [classNames,setClassNames]=React.useState(()=>{
    const info=ds.classInfo||{};
    const names={};
    Object.keys(info).forEach(k=>{
      const v=info[k];
      // 支持新旧格式：{"0": 100} 或 {"0": {"name": "crack", "count": 100}}
      if(typeof v==="number"){
        names[k]=`类${k}`;
      }else if(v&&v.name){
        names[k]=v.name;
      }else{
        names[k]=`类${k}`;
      }
    });
    return names;
  });

  if(!ds) return null;

  return React.createElement('div',{
    style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999},
    onClick:function(e){if(e.target===e.currentTarget&&onClose)onClose();}
  },
    React.createElement('div',{style:{background:C.white,borderRadius:"12px",width:"400px",maxHeight:"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"},
      onClick:function(e){e.stopPropagation();}},
      React.createElement('div',{style:{padding:"20px 24px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement('h3',{style:{fontSize:"16px",fontWeight:600,color:C.gray1}},"编辑标签名称"),
        React.createElement('button',{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",fontSize:"20px",color:C.gray3}},"×")
      ),
      React.createElement('div',{style:{padding:"20px 24px"}},
        React.createElement('div',{style:{fontSize:"13px",color:C.gray2,marginBottom:"15px"}},"数据集: "+ds.name),
        Object.entries(ds.classInfo||{}).map(([k,v])=>{
          const itemCount=typeof v==="number"?v:(v&&v.count?v.count:0);
          const itemName=typeof v==="number"?`类${k}`:(v&&v.name?v.name:`类${k}`);
          return React.createElement('div',{key:k,style:{display:"flex",alignItems:"center",marginBottom:"12px"}},
            React.createElement('span',{style:{width:"100px",fontSize:"13px",color:C.gray2}},`${itemName} (${itemCount.toLocaleString()}):`),
            React.createElement('input',{value:classNames[k]||"",onChange:function(e){
              setClassNames(Object.assign({},classNames,{[k]:e.target.value}));
            },placeholder:"请输入标签名称",style:{flex:1,padding:"8px 12px",border:"1px solid "+C.border,borderRadius:"6px",fontSize:"13px"}})
          );
        }),
        Object.keys(ds.classInfo||{}).length===0&&React.createElement('div',{style:{fontSize:"13px",color:C.gray3,padding:"20px",textAlign:"center"}},"无类别信息")
      ),
      React.createElement('div',{style:{padding:"16px 24px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"flex-end",gap:"12px"}},
        React.createElement('button',{onClick:onClose,
          style:{padding:"10px 20px",border:"1px solid "+C.border,borderRadius:"6px",background:C.white,color:C.gray2,cursor:"pointer",fontSize:"13px"}},"取消"),
        React.createElement('button',{onClick:function(){onSave(classNames);},
          style:{padding:"10px 24px",border:"none",borderRadius:"6px",background:C.primary,color:"white",cursor:"pointer",fontSize:"13px",fontWeight:500}},"保存")
      )
    )
  );
}
