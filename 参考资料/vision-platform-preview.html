  return React.createElement('span',{style:{display:"inline-block",padding:"2px 8px",borderRadius:"4px",fontSize:"11px",fontWeight:500,background:c.bg,border:`1px solid ${c.border}`,color:c.text,whiteSpace:"nowrap"}},label);
}
function AlgoTag({type}){return React.createElement(Tag,{label:type,colors:ALGO_COLORS[type]});}
function ModelCatTag({cat}){return React.createElement(Tag,{label:cat,colors:MODEL_CAT_COLORS[cat]});}

function MiniHeatmap({seed,size=52}){
  const cells=6,s=size;
  const rects=[];
  for(let r=0;r<cells;r++)for(let c=0;c<cells;c++){
    const v=Math.abs(Math.sin(seed*17+r*5+c*7));
    const intensity=Math.round(v*200);
    const fill=r===c?C.primary:`rgb(${255-Math.round(intensity*0.3)},${255-Math.round(intensity*0.6)},255)`;
    rects.push(React.createElement('rect',{key:`${r}-${c}`,x:c*(s/cells),y:r*(s/cells),width:s/cells-0.5,height:s/cells-0.5,fill,opacity:r===c?0.85:0.4+v*0.5}));
  }
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},rects);
}
function MiniDistChart({seed,size=52}){
  const bars=8;
  const heights=Array.from({length:bars},(_,i)=>Math.max(0.12,Math.exp(-Math.pow((i-bars/2)/2,2))*0.85+Math.abs(Math.sin(seed*13.7+i*2.3))*0.15));
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F0F7FF",rx:"2"}),
    ...heights.map((h,i)=>{const bw=size/bars-1,bh=h*(size-6);return React.createElement('rect',{key:i,x:i*(size/bars)+0.5,y:size-bh-3,width:bw,height:bh,fill:C.primary,opacity:0.55+i*0.05,rx:"1"});})
  );
}
function MiniCurve({seed,size=48,color=C.primary}){
  const pts=Array.from({length:10},(_,i)=>Math.min(0.98,Math.max(0.1,1-Math.exp(-i*0.4)+Math.sin(seed*11+i*3.7)*0.03)));
  const w=size,h=size-4;
  const coords=pts.map((v,i)=>`${(i/(pts.length-1))*(w-4)+2},${h-v*(h-4)+2}`).join(" ");
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F4F8FC",rx:"2"}),
    React.createElement('polyline',{points:coords,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"})
  );
}

// 表格中的真实缩略图组件
function TablePreviewGrid({datasetName,count=4,onPreview}){
  const [images,setImages]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(false);

  React.useEffect(function(){
    setLoading(true);
    setError(false);
    fetch("/api/dataset/"+encodeURIComponent(datasetName)+"/images")
      .then(function(res){return res.json();})
      .then(function(data){
        if(data.images&&data.images.length>0){
          setImages(data.images.slice(0,count));
        }else{
          setError(true);
        }
        setLoading(false);
      })
      .catch(function(){
        setError(true);
        setLoading(false);
      });
  },[datasetName,count]);

  if(loading){
    return React.createElement('div',{style:{display:"flex",gap:"2px",flexWrap:"wrap"}},
      Array.from({length:count},(_,i)=>
        React.createElement('div',{key:i,style:{width:"28px",height:"28px",background:C.gray6,borderRadius:"2px",border:`1px solid ${C.border}`}})
      )
    );
  }

  if(error||images.length===0){
    return React.createElement(MiniPreviewGrid,{seed:datasetName.length,count:count,algoType:null});
  }

  return React.createElement('div',{style:{display:"flex",gap:"2px",flexWrap:"wrap"}},
    images.map(function(img,i){
      const imgUrl="/data/"+img.replace("SLSD_vision/data/","");
      return React.createElement('img',{key:i,src:imgUrl,alt:"preview",style:{width:"28px",height:"28px",objectFit:"cover",borderRadius:"2px",border:`1px solid ${C.border}`,cursor:"pointer"},

    })
  );
}

function UploadModal(props){
  const isOpen = props.isOpen;
  const onClose = props.onClose;
  const onSuccess = props.onSuccess;
  const [name,setName]=React.useState("");
  const [algoType,setAlgoType]=React.useState("其他");
  const [description,setDescription]=React.useState("");
  const [maintainer,setMaintainer]=React.useState("管理员");
  const [file,setFile]=React.useState(null);
  const [files,setFiles]=React.useState(null);
  const [uploadMode,setUploadMode]=React.useState("zip");
  const [annotationType,setAnnotationType]=React.useState("yolo");
  const [skipValidation,setSkipValidation]=React.useState(false);
  const [uploading,setUploading]=React.useState(false);
  const [error,setError]=React.useState("");
  const [progress,setProgress]=React.useState(0);
  const [showNameWarning,setShowNameWarning]=React.useState(false);
  const [nameWarningMsg,setNameWarningMsg]=React.useState("");
  const algoTypes=["路面积水检测","漂浮物检测","墙面裂缝检测","游泳检测","其他"];
  const annotationTypes=["yolo","voc","coco"];

  if(!isOpen) return null;

  const handleFileChange = function(e){
    const f = e.target.files;
    if(f && f.length > 0){
      if(uploadMode === "folder"){
        setFiles(f);
        if(!name && f[0].webkitRelativePath){
          const folderName = f[0].webkitRelativePath.split('/')[0];
          setName(folderName);
        }
      }else{
        setFile(f[0]);
        if(!name){
          setName(f[0].name.replace(/\.(zip|tar|gz)$/i,""));
        }
      }
    }
  };

  const validateName = async function(datasetName){
    if(!datasetName.trim()) return {exists:false};
    try{
      const res = await fetch("/api/dataset/validate-name",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:datasetName})
      });
      return await res.json();
    }catch(e){
      return {exists:false};
    }
  };

  const handleSubmit = async function(){
    if(!name.trim()){setError("请输入数据集名称");return;}
    if(uploadMode === "folder" && (!files || files.length === 0)){setError("请选择文件夹");return;}
    if(uploadMode === "zip" && !file){setError("请选择ZIP文件");return;}

    // 检查名称是否已存在
    const nameCheck = await validateName(name);
    if(nameCheck.exists){
      setShowNameWarning(true);
      const storageType = nameCheck.storage_type || "folder";
      setNameWarningMsg(`数据集 "${name}" 已存在，存储方式为: ${storageType === "zip" ? "压缩包" : "文件夹"}。是否覆盖？`);
      return;
    }

    setError("");
    setUploading(true);
    setProgress(10);
    const formData = new FormData();
    if(uploadMode === "folder"){
      for(let i = 0; i < files.length; i++){
        formData.append("files",files[i]);
      }
    }else{
      formData.append("file",file);
    }
    formData.append("name",name);
    formData.append("algoType",algoType);
    formData.append("description",description);
    formData.append("maintainer",maintainer);
    formData.append("uploadMode",uploadMode);
    formData.append("annotationType",annotationType);
    formData.append("skipValidation",skipValidation.toString());
    try{
      setProgress(30);
      const response = await fetch("/api/dataset/upload",{
        method:"POST",
        body:formData
      });
      setProgress(70);
      const contentType = response.headers.get("content-type");
      if(!contentType || !contentType.includes("application/json")){
        const text = await response.text();
        setError("服务器错误: "+text.substring(0,100));
        setUploading(false);
        return;
      }
      const data = await response.json();
      if(data.success){
        setProgress(100);
        if(onClose) onClose();
        setName("");setFile(null);setFiles(null);setDescription("");
        alert("上传成功！");
        window.location.reload();
      }else{
        setError(data.error||"上传失败");
        setUploading(false);
      }
    }catch(e){
      setError("上传失败: "+e.message);
      setUploading(false);
    }

    const info=ds.classInfo||{};
    const names={};
    Object.keys(info).forEach(k=>{
      const v=info[k];
      // 支持新旧格式：{"0": 100} 或 {"0": {"name": "crack", "count": 100}}
      if(typeof v==="number"){
        names[k]=`类${k}`;
      }else if(v&&v.name){
        names[k]=v.name;
      }else{
        names[k]=`类${k}`;
      }
    });
    return names;
  });

  if(!ds) return null;

  return React.createElement('div',{
    style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999},
    onClick:function(e){if(e.target===e.currentTarget&&onClose)onClose();}
  },
    React.createElement('div',{style:{background:C.white,borderRadius:"12px",width:"400px",maxHeight:"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"},
      onClick:function(e){e.stopPropagation();}},
      React.createElement('div',{style:{padding:"20px 24px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement('h3',{style:{fontSize:"16px",fontWeight:600,color:C.gray1}},"编辑标签名称"),
        React.createElement('button',{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",fontSize:"20px",color:C.gray3}},"×")
      ),
      React.createElement('div',{style:{padding:"20px 24px"}},
        React.createElement('div',{style:{fontSize:"13px",color:C.gray2,marginBottom:"15px"}},"数据集: "+ds.name),
        Object.entries(ds.classInfo||{}).map(([k,v])=>{
          const itemCount=typeof v==="number"?v:(v&&v.count?v.count:0);
          const itemName=typeof v==="number"?`类${k}`:(v&&v.name?v.name:`类${k}`);
          return React.createElement('div',{key:k,style:{display:"flex",alignItems:"center",marginBottom:"12px"}},
            React.createElement('span',{style:{width:"100px",fontSize:"13px",color:C.gray2}},`${itemName} (${itemCount.toLocaleString()}):`),
            React.createElement('input',{value:classNames[k]||"",onChange:function(e){
              setClassNames(Object.assign({},classNames,{[k]:e.target.value}));
            },placeholder:"请输入标签名称",style:{flex:1,padding:"8px 12px",border:"1px solid "+C.border,borderRadius:"6px",fontSize:"13px"}})
          );
        }),
        Object.keys(ds.classInfo||{}).length===0&&React.createElement('div',{style:{fontSize:"13px",color:C.gray3,padding:"20px",textAlign:"center"}},"无类别信息")
      ),
      React.createElement('div',{style:{padding:"16px 24px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"flex-end",gap:"12px"}},
        React.createElement('button',{onClick:onClose,
          style:{padding:"10px 20px",border:"1px solid "+C.border,borderRadius:"6px",background:C.white,color:C.gray2,cursor:"pointer",fontSize:"13px"}},"取消"),
        React.createElement('button',{onClick:function(){onSave(classNames);},
          style:{padding:"10px 24px",border:"none",borderRadius:"6px",background:C.primary,color:"white",cursor:"pointer",fontSize:"13px",fontWeight:500}},"保存")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
