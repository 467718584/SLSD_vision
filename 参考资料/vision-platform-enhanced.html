<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>机器视觉管理平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#F0F4F8;}

<body>
<div id="root"></div>
<script type="text/babel">
// 全局错误捕获
window.onerror = function(msg, url, line, col, error) {
  console.error("Global Error:", msg, "Line:", line, "Col:", col);
  document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center"><h2>页面出错</h2><p style="color:#666">'+msg+' (行'+line+')</p></div>';
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  console.error("Unhandled Promise Rejection:", e.reason);
});
const C={primary:"#1462A8",primaryBg:"#EBF3FC",primaryBd:"#BFDBF7",success:"#2E8B57",successBg:"#E8F5EE",warning:"#E67E22",warningBg:"#FEF5E7",orange:"#E8631A",orangeBg:"#FDF0E7",gray1:"#1A2332",gray2:"#3D5166",gray3:"#6B8299",gray4:"#9EAFBE",gray5:"#C8D6E1",gray6:"#E8F0F5",gray7:"#F4F7FA",bg:"#F0F4F8",white:"#FFFFFF",border:"#D8E4EE"};
const ALGO_COLORS={"路面积水检测":{bg:C.primaryBg,border:C.primaryBd,text:C.primary},"漂浮物检测":{bg:C.successBg,border:"#A8D5C0",text:C.success},"墙面裂缝检测":{bg:C.warningBg,border:"#F9D9B0",text:C.warning},"游泳检测":{bg:"#FDE9E9",border:"#F5BCBC",text:"#C0392B"},"其他":{bg:C.gray6,border:C.border,text:C.gray2}};
const MODEL_CAT_COLORS={"多标签实例分割模型（双标签）":{bg:C.primaryBg,border:C.primaryBd,text:C.primary},"多标签实例分割模型（三标签）":{bg:"#E8F4FE",border:"#A8D0F5",text:"#0A4D8C"},"单标签实例分割模型（背景负样本）":{bg:C.successBg,border:"#A8D5C0",text:C.success},"单标签实例分割模型":{bg:"#EDF6E8",border:"#B0D9A0",text:"#276B27"},"单标签目标检测模型":{bg:C.orangeBg,border:"#F5C8A8",text:C.orange},"其他":{bg:C.gray6,border:C.border,text:C.gray2},"YOLO":{bg:C.primaryBg,border:C.primaryBd,text:C.primary}};

const DATASETS=DATASETS_PLACEHOLDER;
const MODELS=MODELS_PLACEHOLDER;

function Tag({label,colors}){
  const c=colors||{bg:C.gray6,border:C.border,text:C.gray2};
  return React.createElement('span',{style:{display:"inline-block",padding:"2px 8px",borderRadius:"4px",fontSize:"11px",fontWeight:500,background:c.bg,border:`1px solid ${c.border}`,color:c.text,whiteSpace:"nowrap"}},label);
}
function AlgoTag({type}){return React.createElement(Tag,{label:type,colors:ALGO_COLORS[type]});}
function ModelCatTag({cat}){return React.createElement(Tag,{label:cat,colors:MODEL_CAT_COLORS[cat]});}

function MiniHeatmap({seed,size=52}){
  const cells=6,s=size;
  const rects=[];
  for(let r=0;r<cells;r++)for(let c=0;c<cells;c++){
    const v=Math.abs(Math.sin(seed*17+r*5+c*7));
    const intensity=Math.round(v*200);
    const fill=r===c?C.primary:`rgb(${255-Math.round(intensity*0.3)},${255-Math.round(intensity*0.6)},255)`;
    rects.push(React.createElement('rect',{key:`${r}-${c}`,x:c*(s/cells),y:r*(s/cells),width:s/cells-0.5,height:s/cells-0.5,fill,opacity:r===c?0.85:0.4+v*0.5}));
  }
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},rects);
}
function MiniDistChart({seed,size=52}){
  const bars=8;
  const heights=Array.from({length:bars},(_,i)=>Math.max(0.12,Math.exp(-Math.pow((i-bars/2)/2,2))*0.85+Math.abs(Math.sin(seed*13.7+i*2.3))*0.15));
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F0F7FF",rx:"2"}),
    ...heights.map((h,i)=>{const bw=size/bars-1,bh=h*(size-6);return React.createElement('rect',{key:i,x:i*(size/bars)+0.5,y:size-bh-3,width:bw,height:bh,fill:C.primary,opacity:0.55+i*0.05,rx:"1"});})
  );
}
function MiniCurve({seed,size=48,color=C.primary}){
  const pts=Array.from({length:10},(_,i)=>Math.min(0.98,Math.max(0.1,1-Math.exp(-i*0.4)+Math.sin(seed*11+i*3.7)*0.03)));
  const w=size,h=size-4;
  const coords=pts.map((v,i)=>`${(i/(pts.length-1))*(w-4)+2},${h-v*(h-4)+2}`).join(" ");
  return React.createElement('svg',{width:size,height:size,style:{borderRadius:"3px",flexShrink:0}},
    React.createElement('rect',{width:size,height:size,fill:"#F4F8FC",rx:"2"}),
    React.createElement('polyline',{points:coords,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"})
  );
}
function MiniPreviewGrid({seed,count=8,algoType}){
  const col=(ALGO_COLORS[algoType]||{text:C.primary}).text;
  const total=Math.min(count,8);
  return React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:"2px"}},
    Array.from({length:total},(_,i)=>{
      const hasBox=Math.sin(seed*5+i)>0.1;
      return React.createElement('div',{key:i,style:{width:"26px",height:"19px",background:`hsl(${205+(seed+i*7)%40},${28+i%12}%,${84-i}%)`,borderRadius:"2px",position:"relative",overflow:"hidden",border:`1px solid ${C.border}`,flexShrink:0}},
        hasBox&&React.createElement('div',{style:{position:"absolute",left:"15%",top:"10%",width:"55%",height:"65%",border:`1.5px solid ${col}`,borderRadius:"1px",opacity:0.85}})
      );
    })
  );
}
function AccuracyBar({value,width=90}){
  const col=value>=95?C.success:value>=85?C.primary:C.warning;
  return React.createElement('div',{style:{display:"flex",alignItems:"center",gap:"8px"}},
    React.createElement('div',{style:{width,height:"6px",background:C.gray6,borderRadius:"3px",overflow:"hidden"}},
      React.createElement('div',{style:{width:`${value}%`,height:"100%",background:col,borderRadius:"3px"}})
    ),
    React.createElement('span',{style:{fontSize:"13px",fontWeight:700,color:col,minWidth:"46px"}},`${value}%`)
  );
}
function SectionTitle({children}){
  return React.createElement('div',{style:{fontSize:"13px",fontWeight:600,color:C.gray1,marginBottom:"14px",display:"flex",alignItems:"center",gap:"7px"}},
    React.createElement('div',{style:{width:"3px",height:"14px",background:C.primary,borderRadius:"2px"}}),
    children
  );
}
function Card({children,style={}}){
  return React.createElement('div',{style:{background:C.white,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"18px",...style}},children);
}

// ========== 上传弹窗组件 ==========
function UploadModal({isOpen,onClose,onSuccess}){
  const [name,setName]=React.useState("");
  const [algoType,setAlgoType]=React.useState("其他");
  const [description,setDescription]=React.useState("");
  const [maintainer,setMaintainer]=React.useState("管理员");
  const [file,setFile]=React.useState(null);
  const [uploading,setUploading]=React.useState(false);
  const [error,setError]=React.useState("");
  const [progress,setProgress]=React.useState(0);

  const algoTypes=["路面积水检测","漂浮物检测","墙面裂缝检测","游泳检测","其他"];

  const handleFileChange=(e)=>{
    try{
      const f=e.target.files && e.target.files[0];
      if(f){
        setFile(f);
        const fileName = f.name || '';
        if(!name && fileName){
          setName(fileName.replace(/\.(zip|tar|gz)$/i,""));
        }
      }
    }catch(err){
      console.error("File change error:", err);
    }
  };

  const handleSubmit=async ()=>{
    if(!name.trim()){setError("请输入数据集名称");return;}
    if(!file){setError("请选择文件或文件夹");return;}
    setError("");
    setUploading(true);
    setProgress(10);

    const formData=new FormData();
    formData.append("file",file);
    formData.append("name",name);
    formData.append("algoType",algoType);
    formData.append("description",description);
    formData.append("maintainer",maintainer);

    try{
      setProgress(30);
      const response=await fetch("/api/dataset/upload",{
        method:"POST",
        body:formData
      });
      setProgress(70);
      const data=await response.json();
      if(data.success){
        setProgress(100);
        setTimeout(()=>{
          onSuccess();
          onClose();
          setName("");setFile(null);setDescription("");
        },500);
      }else{
        setError(data.error||"上传失败");
        setUploading(false);
      }
    }catch(e){
      setError("上传失败: "+e.message);
      setUploading(false);
    }
  };

  if(!isOpen)return null;

  return React.createElement('div',{style:{
    position:"fixed",top:0,left:0,right:0,bottom:0,
    background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",
    zIndex:9999
  }},onClick:onClose,
    React.createElement('div',{style:{
      background:C.white,borderRadius:"12px",width:"480px",maxHeight:"90vh",overflow:"auto",
      boxShadow:"0 20px 60px rgba(0,0,0,0.3)"
    },onClick:e=>e.stopPropagation()},
      // 标题
      React.createElement('div',{style:{
        padding:"20px 24px",borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center"
      }},
        React.createElement('h3',{fontSize:"16px",fontWeight:600,color:C.gray1},"新建数据集"),
        React.createElement('button',{onClick:onClose,style:{
          background:"none",border:"none",cursor:"pointer",fontSize:"20px",color:C.gray3
        }},"×")
      ),
      // 表单
      React.createElement('div',{style:{padding:"20px 24px"}},
        // 名称
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('label',{style:{display:"block",fontSize:"13px",fontWeight:500,color:C.gray2,marginBottom:"6px"}},"数据集名称 *"),
          React.createElement('input',{value:name,onChange:e=>setName(e.target.value),placeholder:"请输入数据集名称",
            style:{width:"100%",padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",outline:"none"}})
        ),
        // 算法类型
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('label',{style:{display:"block",fontSize:"13px",fontWeight:500,color:C.gray2,marginBottom:"6px"}},"算法类型"),
          React.createElement('select',{value:algoType,onChange:e=>setAlgoType(e.target.value),
            style:{width:"100%",padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",outline:"none",background:"white"}},
            ...algoTypes.map(t=>React.createElement('option',{key:t,value:t},t))
          )
        ),
        // 描述
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('label',{style:{display:"block",fontSize:"13px",fontWeight:500,color:C.gray2,marginBottom:"6px"}},"描述"),
          React.createElement('textarea',{value:description,onChange:e=>setDescription(e.target.value),placeholder:"请输入数据集描述",
            style:{width:"100%",padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",outline:"none",minHeight:"80px",resize:"vertical"}})
        ),
        // 维护人员
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('label',{style:{display:"block",fontSize:"13px",fontWeight:500,color:C.gray2,marginBottom:"6px"}},"维护人员"),
          React.createElement('input',{value:maintainer,onChange:e=>setMaintainer(e.target.value),
            style:{width:"100%",padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",outline:"none"}})
        ),
        // 文件上传
        React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('label',{style:{display:"block",fontSize:"13px",fontWeight:500,color:C.gray2,marginBottom:"6px"}},"上传文件 *",React.createElement('span',{style:{fontWeight:400,color:C.gray3,marginLeft:"8px"}},"支持 ZIP 压缩包或文件夹")),
          React.createElement('div',{className:"upload-click-area",style:{border:`2px dashed ${C.border}`,borderRadius:"8px",padding:"30px",textAlign:"center",cursor:"pointer",background:C.gray7},
            onClick:()=>{
              const input = document.getElementById('datasetFileInput');
              if(input) input.click();
            }},
            file?React.createElement('div',null,
              React.createElement('div',{style:{fontSize:"24px",marginBottom:"8px"}},"📦"),
              React.createElement('div',{style:{color:C.primary,fontWeight:500,fontSize:"13px"}},file.name),
              React.createElement('div',{style:{color:C.gray3,fontSize:"11px",marginTop:"4px"}},"点击更换文件")
            ):React.createElement('div',null,
              React.createElement('div',{style:{fontSize:"24px",marginBottom:"8px"}},"📁"),
              React.createElement('div',{style:{color:C.gray2,fontSize:"13px"}},"点击选择文件或拖拽到此处"),
              React.createElement('div',{style:{color:C.gray3,fontSize:"11px",marginTop:"4px"}})
            )
          ),
          React.createElement('input',{id:"datasetFileInput",type:"file",onChange:handleFileChange,webkitdirectory:"",multiple:false,style:{display:"none"}})
        ),
        // 错误提示
        error&&React.createElement('div',{style:{color:"#E74C3C",fontSize:"12px",marginBottom:"12px",padding:"8px",background:"#FDF2F2",borderRadius:"4px"}},error),
        // 进度条
        uploading&&React.createElement('div',{style:{marginBottom:"16px"}},
          React.createElement('div',{style:{height:"6px",background:C.gray6,borderRadius:"3px",overflow:"hidden"}},
            React.createElement('div',{style:{width:`${progress}%`,height:"100%",background:C.primary,transition:"width 0.3s"}})
          ),
          React.createElement('div',{style:{fontSize:"11px",color:C.gray3,marginTop:"4px",textAlign:"center"}},`${progress === 100 ? "处理中..." : "上传中..."}`)
        )
      ),
      // 按钮
      React.createElement('div',{style:{padding:"16px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:"12px"}},
        React.createElement('button',{onClick:onClose,disabled:uploading,
          style:{padding:"10px 20px",border:`1px solid ${C.border}`,borderRadius:"6px",background:C.white,color:C.gray2,cursor:uploading?"not-allowed":"pointer",fontSize:"13px"}},"取消"),
        React.createElement('button',{onClick:handleSubmit,disabled:uploading,
          style:{padding:"10px 24px",border:"none",borderRadius:"6px",background:C.primary,color:"white",cursor:uploading?"not-allowed":"pointer",fontSize:"13px",fontWeight:500,opacity:uploading?0.7:1}},"上传")
      )
    )
  );
}

// ========== 数据集详情 ==========
function DatasetDetail({ds,onBack,onRefresh}){
  const [images,setImages]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [deleting,setDeleting]=React.useState(false);
  const [showDeleteConfirm,setShowDeleteConfirm]=React.useState(false);

  React.useEffect(()=>{
    fetch(`/api/dataset/${encodeURIComponent(ds.name)}/images`)
      .then(r=>r.json())
      .then(data=>{setImages(data.images||[]);setLoading(false);})
      .catch(()=>{setLoading(false);});
  },[ds.name]);

  const handleDelete=async ()=>{
    setDeleting(true);
    try{
      const res=await fetch(`/api/dataset/${encodeURIComponent(ds.name)}`,{method:"DELETE"});
      const data=await res.json();
      if(data.success){
        onRefresh();
        onBack();
      }else{
        alert("删除失败: "+data.error);
      }
    }catch(e){
      alert("删除失败");
    }
    setDeleting(false);
    setShowDeleteConfirm(false);
  };

  const palette=[C.primary,"#E8631A",C.success,"#8E44AD","#C0392B"];
  const totalLabels=Object.values(ds.labels).reduce((a,b)=>a+(typeof b==="number"?b:0),0)||1;
  const splitParts=ds.split.split(":").map(Number);
  const splitTotal=splitParts.reduce((a,b)=>a+b,0);
  const splitNames=splitParts.length===3?["训练集","验证集","测试集"]:["训练集","验证集"];
  const splitColors=[C.primary,"#E8631A",C.success];

  return React.createElement('div',null,
    // 面包屑
    React.createElement('div',{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px"}},
      React.createElement('button',{onClick:onBack,style:{background:"none",border:`1px solid ${C.border}`,borderRadius:"6px",padding:"5px 14px",color:C.gray2,cursor:"pointer",fontSize:"13px",fontFamily:"inherit"}},"← 返回数据集列表"),
      React.createElement('span',{style:{color:C.gray4}},"/"),
      React.createElement('span',{style:{color:C.primary,fontSize:"13px"}},ds.name)
    ),
    // 头部卡片
    React.createElement(Card,{style:{marginBottom:"16px",padding:"20px 24px"}},
      React.createElement('div',{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"16px",flexWrap:"wrap"}},
        React.createElement('div',{style:{flex:1,minWidth:"280px"}},
          React.createElement('div',{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},
            React.createElement(AlgoTag,{type:ds.algoType}),
            React.createElement('span',{style:{fontSize:"13px",color:C.gray4}},`编号 #${ds.id}`)
          ),
          React.createElement('div',{style:{fontSize:"18px",fontWeight:700,color:C.gray1,marginBottom:"10px"}},ds.name),
          React.createElement('div',{style:{fontSize:"13px",color:C.gray2,lineHeight:1.8}},ds.desc)
        ),
        React.createElement('div',{style:{display:"flex",gap:"10px",flexWrap:"wrap"}},
          ...[["样本数量",ds.total.toLocaleString(),C.primary],["标签数量",ds.labelCount,C.gray1],["分配比例",ds.split,C.gray1]].map(([l,v,c])=>
            React.createElement('div',{key:l,style:{textAlign:"center",padding:"12px 18px",background:C.gray7,borderRadius:"8px",border:`1px solid ${C.border}`}},
              React.createElement('div',{style:{fontSize:"20px",fontWeight:700,color:c}},v),
              React.createElement('div',{style:{fontSize:"11px",color:C.gray3,marginTop:"2px"}},l)
            )
          )
        )
      ),
      React.createElement('div',{style:{marginTop:"14px",display:"flex",gap:"20px",fontSize:"13px",color:C.gray3,borderTop:`1px solid ${C.gray6}`,paddingTop:"12px",flexWrap:"wrap"}},
        React.createElement('span',null,"维护日期：",React.createElement('b',{style:{color:C.gray2}},ds.maintainDate)),
        React.createElement('span',null,"维护人员：",React.createElement('b',{style:{color:C.gray2}},ds.maintainer))
      ),
      // 操作按钮
      React.createElement('div',{style:{marginTop:"16px",display:"flex",gap:"12px"}},
        React.createElement('button',{style:{display:"flex",alignItems:"center",gap:"6px",padding:"8px 16px",background:C.primaryBg,border:`1px solid ${C.primaryBd}`,borderRadius:"6px",color:C.primary,cursor:"pointer",fontSize:"13px"}},
          React.createElement('span',null,"📥"),"下载数据集"
        ),
        React.createElement('button',{onClick:()=>setShowDeleteConfirm(true),style:{display:"flex",alignItems:"center",gap:"6px",padding:"8px 16px",background:"#FDF2F2",border:`1px solid #F5BCBC`,borderRadius:"6px",color:"#C0392B",cursor:"pointer",fontSize:"13px"}},
          React.createElement('span',null,"🗑️"),"删除数据集"
        )
      ),
      // 文件状态
      React.createElement('div',{style:{marginTop:"12px",display:"flex",gap:"12px",flexWrap:"wrap"}},
        ds.hasFolder&&React.createElement('span',{style:{fontSize:"11px",padding:"4px 10px",background:C.successBg,color:C.success,borderRadius:"12px",border:`1px solid #A8D5C0`}},"📁 已上传文件夹"),
        ds.hasZip&&React.createElement('span',{style:{fontSize:"11px",padding:"4px 10px",background:C.primaryBg,color:C.primary,borderRadius:"12px",border:`1px solid ${C.primaryBd}`}},"📦 已上传压缩包")
      )
    ),
    // 内容
    React.createElement('div',{style:{display:"grid",gridTemplateColumns:"240px 1fr",gap:"16px"}},
      // 左
      React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:"16px"}},
        React.createElement(Card,null,
          React.createElement(SectionTitle,null,"各标签数量"),
          ...Object.entries(ds.labels).map(([k,v],i)=>{
            const col=palette[i%palette.length];
            const pct=typeof v==="number"?Math.round(v/totalLabels*100):0;
            return React.createElement('div',{key:k,style:{marginBottom:"12px"}},
              React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},
                React.createElement('span',{style:{fontSize:"13px",color:C.gray2,fontWeight:500}},k),
                React.createElement('span',{style:{fontSize:"13px",color:col,fontWeight:600}},typeof v==="number"?v.toLocaleString():"—")
              ),
              typeof v==="number"&&React.createElement('div',{style:{height:"5px",background:C.gray6,borderRadius:"3px",overflow:"hidden"}},
                React.createElement('div',{style:{width:`${pct}%`,height:"100%",background:col,borderRadius:"3px"}})
              )
            );
          })
        ),
        React.createElement(Card,null,
          React.createElement(SectionTitle,null,"数据集划分"),
          ...splitNames.map((name,i)=>{
            const pct=Math.round(splitParts[i]/splitTotal*100);
            return React.createElement('div',{key:name,style:{marginBottom:"10px"}},
              React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},
                React.createElement('span',{style:{fontSize:"13px",color:C.gray2}},name),
                React.createElement('span',{style:{fontSize:"13px",color:splitColors[i],fontWeight:600}},`${pct}%`)

      // ===== Model Detail =====
      tab==="models"&&selModel&&React.createElement(ModelDetail,{model:selModel,onBack:()=>setSelModel(null),onGotoDataset:gotoDs})
    ),
    // 上传弹窗
    React.createElement(UploadModal,{isOpen:showUpload,onClose:()=>setShowUpload(false),onSuccess:refreshData})
  );
}

// 错误边界组件
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error("React Error:", error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: { padding: 40, textAlign: 'center' }},
        React.createElement('h2', null, '页面加载出错'),
        React.createElement('p', { style: { color: '#666' }},
          this.state.error ? this.state.error.toString() : '未知错误'
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null,
    React.createElement(App)
  )
);
</script>
