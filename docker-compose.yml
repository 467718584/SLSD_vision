version: '3.8'

services:
  vision-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: sldsvision/platform:latest
    container_name: sldsvision-platform
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

