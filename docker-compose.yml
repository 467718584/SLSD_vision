version: '3.8'

services:
  vision-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: sldsvision/platform:latest
    container_name: sldsvision-platform
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOG_DIR:-./logs}:/app/logs
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DB_PATH=/app/data/vision_platform.db
      - DATASETS_DIR=/app/data/datasets
      - MODELS_DIR=/app/data/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vision-network
    mem_limit: ${MEM_LIMIT:-2g}
    cpus: ${CPUS:-1.0}
    # Docker 日志配置
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILES:-7}
        labels: ${LOG_LABELS:-app,service}
        env: ${LOG_ENV:-FLASK_ENV,LOG_LEVEL}

  # 数据备份服务 (按需启用)
  # 使用方式: docker-compose run --rm backup
  backup:
    image: sldsvision/platform:latest
    container_name: sldsvision-backup
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${BACKUP_DIR:-./backups}:/app/backups
    entrypoint: ["python", "/app/scripts/backup.py"]
    profiles:
      - maintenance
    networks:
      - vision-network
    logging:
      driver: "none"

networks:
  vision-network:
    driver: bridge

