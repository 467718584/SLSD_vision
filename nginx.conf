server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm;

    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }

    # 兼容前端直接调用 /api/ 的情况
    location /api/ {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 兼容前端直接调用 /data/ 的情况
    location /data/ {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /anomagic/ {
        alias /var/www/html/anomagic-web/;
        try_files $uri $uri/ =404;
        index index.html;
    }

    location /anomagic/api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /slsd-vision/ {
        alias /var/www/html/slsd-vision/;
        try_files $uri $uri/ /slsd-vision/index.html;
        index index.html;
    }

    location /slsd-vision/api/ {
        rewrite ^/slsd-vision/api(.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /slsd-vision/data/ {
        rewrite ^/slsd-vision/data(.*)$ /data$1 break;
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
