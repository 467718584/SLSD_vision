<!-- 数据集列表模板 -->
<div class="page-header">
    <div>
        <h2 class="page-title">数据集管理</h2>
        <p class="page-desc">共 {{dataset_count}} 个数据集 · {{total_samples}} 个样本</p>
    </div>
</div>

<!-- 搜索和筛选 -->
<div class="filter-bar">
    <input type="text" class="search-input" placeholder="搜索数据集名称..." id="ds-search" value="{{search_query}}">
    <div class="filter-tags">
        {{filter_btns}}
    </div>
    <span class="filter-count">显示 {{filter_count}} 条</span>
</div>

<!-- 数据集表格 -->
<div class="data-table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th style="width:48px;text-align:center;">编号</th>
                <th style="width:110px;text-align:center;">算法类型</th>
                <th style="width:180px;">数据集名称</th>
                <th style="width:70px;text-align:center;">分配比例</th>
                <th style="width:72px;text-align:center;">样本数量</th>
                <th style="width:84px;text-align:center;">详情图</th>
                <th style="width:84px;text-align:center;">分布图</th>
                <th style="width:64px;text-align:center;">标签数</th>
                <th style="width:130px;">各标签数量</th>
                <th style="width:140px;">数据集预览</th>
                <th style="width:160px;">数据集概述</th>
                <th style="width:86px;text-align:center;">维护日期</th>
                <th style="width:72px;text-align:center;">维护人员</th>
            </tr>
        </thead>
        <tbody>
            {{dataset_rows}}
        </tbody>
    </table>
</div>

<!-- 空状态 -->
{% if dataset_count == 0 %}
<div class="empty-state">
    <div class="empty-icon">📂</div>
    <h3>暂无数据集</h3>
    <p>请在左侧上传数据集</p>
</div>
{% endif %}
