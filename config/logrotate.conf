# Logrotate configuration for SLSD Vision Platform
# 部署路径: /etc/logrotate.d/slsd-vision

# 日志文件路径
/home/zzy/slsd_vision/logs/*.log {
    # 每日轮转
    daily
    
    # 保留7天的日志
    rotate 7
    
    # 压缩历史日志
    compress
    delaycompress
    
    # 不处理不存在的日志
    missingok
    
    # 通知而不是错误（如果日志文件在轮转期间被删除）
    notifempty
    
    # 轮转后创建新日志，权限 644
    create 644 zzy zzy
    
    # 同步执行（生产环境建议异步）
    # async
    
    # 轮转后执行脚本
    postrotate
        # 通知 Flask 应用重新打开日志文件
        # 如果使用 systemd，可以发送 SIGHUP: kill -SIGHUP $(cat /var/run/flask.pid)
        # 对于 Docker 环境，日志由 Docker 管理，这里主要处理应用日志
        if [ -f /home/zzy/slsd_vision/logs/app.log ]; then
            # 可选：向应用发送信号重新加载日志
            touch /home/zzy/slsd_vision/logs/.reload
        fi
    endscript
    
    # 轮转前执行脚本
    prerotate
        if [ -d /home/zzy/slsd_vision/logs ]; then
            # 确保日志目录存在
            mkdir -p /home/zzy/slsd_vision/logs
        fi
    endscript
}

